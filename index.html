
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Christaville School - Excellence in Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
            background: #f8fafc;
        }

        /* Beautiful Mesh Gradient Background */
        .mesh-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-color: #f8fafc;
            background-image: 
                radial-gradient(at 0% 0%, hsla(210,100%,96%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(35,100%,96%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(220,100%,94%,1) 0, transparent 50%), 
                radial-gradient(at 0% 100%, hsla(20,100%,96%,1) 0, transparent 50%), 
                radial-gradient(at 100% 100%, hsla(240,100%,96%,1) 0, transparent 50%);
            filter: blur(80px);
            opacity: 0.8;
        }

        .glass-effect {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .card-glow:hover {
            box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.1), 0 0 30px rgba(245, 158, 11, 0.15);
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .float-animation {
            animation: float 4s ease-in-out infinite;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0"
  }
}
</script>
</head>
<body class="text-slate-900">
    <div class="mesh-gradient"></div>
    <div id="root"></div>
</body>
</html>

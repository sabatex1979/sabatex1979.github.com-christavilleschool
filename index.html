
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MORAVIA online Education - Excellence in Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
            background: #ffffff;
            overflow-x: hidden;
        }

        /* Vibrant Animated Mesh Gradient Background */
        .mesh-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background-color: #ffffff;
            background-image: 
                radial-gradient(at 0% 0%, hsla(215,100%,92%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(35,100%,92%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(280,100%,92%,1) 0, transparent 50%), 
                radial-gradient(at 0% 100%, hsla(160,100%,92%,1) 0, transparent 50%), 
                radial-gradient(at 100% 100%, hsla(340,100%,92%,1) 0, transparent 50%);
            filter: blur(80px);
            opacity: 0.9;
            animation: mesh-rotate 30s linear infinite alternate;
        }

        @keyframes mesh-rotate {
            0% { transform: scale(1) rotate(0deg); }
            100% { transform: scale(1.2) rotate(5deg); }
        }

        .glass-effect {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
        }

        .gradient-text {
            background: linear-gradient(135deg, #0f172a 0%, #d97706 50%, #7c3aed 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .colorful-card-nursery { background: linear-gradient(135deg, rgba(254, 243, 199, 0.4) 0%, rgba(253, 230, 138, 0.2) 100%); }
        .colorful-card-grade { background: linear-gradient(135deg, rgba(219, 234, 254, 0.4) 0%, rgba(191, 219, 254, 0.2) 100%); }
        .colorful-card-secondary { background: linear-gradient(135deg, rgba(243, 232, 255, 0.4) 0%, rgba(233, 213, 255, 0.2) 100%); }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        .float-animation {
            animation: float 6s ease-in-out infinite;
        }
    </style>
